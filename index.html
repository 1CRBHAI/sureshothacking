<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { 
            background-color: #03060c; /* Deep space background */
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
            /* Subtle stars effect */
            background-image: radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 4px), radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 3px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
        }
        
        .container {
            background: #0f1524;
            width: 100%;
            max-width: 420px;
            border-radius: 24px;
            padding: 35px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Center glowing effect */
        .container::before {
            content: ''; 
            position: absolute; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            width: 250px; 
            height: 250px; 
            background: rgba(230, 150, 20, 0.15); 
            filter: blur(70px); 
            z-index: 0;
        }

        .content-wrapper { position: relative; z-index: 1; }
        
        .profile-img { 
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            border: 3px solid #1a2235; 
            margin-bottom: 20px; 
            object-fit: cover; 
        }

        .badge {
            display: inline-flex; 
            align-items: center;
            gap: 6px;
            background: rgba(255, 184, 0, 0.08); 
            border: 1px solid rgba(255, 184, 0, 0.4);
            color: #f6c04f; 
            font-size: 12px; 
            font-weight: 600; 
            padding: 6px 16px; 
            border-radius: 30px; 
            margin-bottom: 18px; 
            letter-spacing: 0.5px;
        }

        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.5px; }
        .subtitle { font-size: 14px; color: #e5e7eb; margin-bottom: 20px; }
        .features { font-size: 13px; color: #9ca3af; line-height: 1.8; margin-bottom: 30px; padding: 0 10px; font-weight: 400; }
        
        .cta-btn {
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px;
            background: linear-gradient(90deg, #f7971e 0%, #ffd200 100%);
            color: #000; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 16px;
            padding: 16px 20px; 
            border-radius: 30px; 
            margin-bottom: 30px; 
            transition: transform 0.2s;
        }
        
        .cta-btn:active { transform: scale(0.97); }

        .stats { 
            display: flex; 
            justify-content: space-between; 
            border-top: 1px solid rgba(255,255,255,0.06); 
            padding-top: 25px; 
            margin-bottom: 25px; 
        }
        
        .stat-item { flex: 1; }
        .stat-item h3 { color: #ffd200; font-size: 18px; margin-bottom: 4px; font-weight: 700; }
        .stat-item p { font-size: 10px; color: #8a8f9e; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .footer-credit { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; 
            padding: 14px; 
            font-size: 12px; 
            color: #9ca3af; 
            display: inline-block;
            width: 90%;
        }
        .footer-credit span { color: #60a5fa; font-weight: 600; }
    </style>
